<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>极简首页</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-orb orb-one"></div>
  <div class="bg-orb orb-two"></div>
  <div class="bg-grid"></div>

  <main class="hero-card">
    <div class="hero-badge">Fresh Start</div>
    <div class="time" id="time"></div>
    <div class="date" id="date"></div>

    <div class="search-container">
      <span class="search-icon" aria-hidden="true">⌕</span>
      <input type="text" class="search-input" id="searchInput" placeholder="今天想搜索点什么？" autocomplete="off" autofocus>
      <div class="search-suggestions" id="searchSuggestions" hidden></div>
    </div>

    <div class="quote-panel" id="quotePanel">
      <p class="quote-text" id="quoteText"></p>
      <p class="quote-author" id="quoteAuthor"></p>
    </div>

    <p class="search-tip">按 Enter 即刻开始探索</p>

    <section class="calendar-panel" aria-label="日历">
      <div class="calendar-header">
        <div class="calendar-title-group">
          <p class="calendar-label">Calendar</p>
          <h2 class="calendar-title" id="calendarTitle"></h2>
        </div>
        <div class="calendar-today" id="calendarToday"></div>
      </div>
      <div class="calendar-weekdays" id="calendarWeekdays"></div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </section>
  </main>

  <aside class="bookmarks-panel" aria-label="书签目录">
    <div class="bookmarks-header">
      <p class="bookmarks-label">Bookmarks</p>
      <h2 class="bookmarks-title">书签目录</h2>
    </div>
    <div class="bookmarks-tree" id="bookmarksTree">
      <p class="bookmarks-empty">正在载入书签...</p>
    </div>
  </aside>

  <div class="corner-glow"></div>

  <button class="settings-toggle" id="settingsToggle" aria-label="设置" title="设置">⚙</button>

  <dialog class="settings-dialog" id="settingsDialog">
    <div class="settings-header">
      <h3 class="settings-title">设置</h3>
      <button class="settings-close" id="settingsClose" aria-label="关闭">✕</button>
    </div>
    <div class="settings-body">
      <div class="settings-section">
        <h4 class="settings-section-title">壁纸主题</h4>
        <div class="theme-grid" id="themeGrid">
          <button class="theme-option is-active" data-theme="warm">
            <span class="theme-preview theme-warm"></span>
            <span class="theme-label">暖色渐变</span>
          </button>
          <button class="theme-option" data-theme="ocean">
            <span class="theme-preview theme-ocean"></span>
            <span class="theme-label">深海蓝调</span>
          </button>
          <button class="theme-option" data-theme="forest">
            <span class="theme-preview theme-forest"></span>
            <span class="theme-label">清晨绿意</span>
          </button>
          <button class="theme-option" data-theme="sunset">
            <span class="theme-preview theme-sunset"></span>
            <span class="theme-label">暮光晚霞</span>
          </button>
          <button class="theme-option" data-theme="lavender">
            <span class="theme-preview theme-lavender"></span>
            <span class="theme-label">薰衣草梦</span>
          </button>
          <button class="theme-option" data-theme="auto">
            <span class="theme-preview theme-auto"></span>
            <span class="theme-label">自动轮换</span>
          </button>
        </div>
      </div>
      <div class="settings-section">
        <h4 class="settings-section-title">每日一句</h4>
        <label class="settings-switch">
          <input type="checkbox" id="quoteToggle" checked>
          <span class="switch-track"></span>
          <span class="switch-label">显示每日名言</span>
        </label>
      </div>
    </div>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
